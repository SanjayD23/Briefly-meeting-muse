<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg-base: #0B0F19;
      --bg-card: rgba(17, 24, 39, 0.7);
      --border: #1F2937;
      --border-light: #374151;
      --text-main: #F9FAFB;
      --text-muted: #9CA3AF;
      --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
      --accent-hover: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
      --glow-cyan: rgba(14, 165, 233, 0.4);
      --recording-base: #f43f5e; /* Keeping recording red so it looks like a record button */
      --recording-bg: rgba(244, 63, 94, 0.1);
      --processing-base: #0ea5e9;
      --success-base: #0ea5e9;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 24px; margin: 0; background-color: var(--bg-base); color: var(--text-main);
    }

    h1 { 
      font-size: 24px; margin: 0 0 16px 0; padding-bottom: 16px; font-weight: 800; 
      display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border);
    }

    .title-group { display: flex; align-items: center; gap: 10px; }

    .icon-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      padding: 8px; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center;
    }
    .icon-btn:hover { background: var(--border); color: var(--text-main); }
    .icon-btn svg { width: 20px; height: 20px; }

    .status-pill { 
      background: var(--bg-card); padding: 8px 18px; border-radius: 50px; 
      font-size: 13px; margin: 20px auto; font-weight: 600; display: inline-flex; align-items: center;
      gap: 8px; border: 1px solid var(--border-light); color: var(--text-muted);
    }

    .pill-recording { background: var(--recording-bg); border-color: var(--recording-base); color: #fda4af; }
    .pill-processing { background: rgba(139, 92, 246, 0.1); border-color: var(--processing-base); color: #d8b4fe; }
    .pill-complete { background: rgba(16, 185, 129, 0.1); border-color: var(--success-base); color: #6ee7b7; }

    select { 
      width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 10px; 
      border: 1px solid var(--border-light); background-color: var(--bg-card); color: var(--text-main);
    }

    button.primary { 
      width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 10px; 
      font-size: 14px; font-weight: 700; cursor: pointer; background: var(--accent-gradient); color: white;
    }

    .controls { display: none; gap: 10px; margin-bottom: 16px; }
    .controls button { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }

    #mainView, #historyView { transition: all 0.3s; }
    
    .section-title { font-size: 11px; font-weight: 700; margin: 20px 0 8px 0; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .text-content, .history-list, ul { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 16px; font-size: 14px; line-height: 1.6; }
    ul { list-style-type: disc; padding-left: 36px; margin: 0; }
    li { margin-bottom: 8px; }

    .history-item { border-bottom: 1px solid var(--border); padding: 12px 0; cursor: pointer; }
    .history-item:hover { background: rgba(255,255,255,0.03); }
    .history-date { font-size: 10px; color: var(--text-muted); }
    .history-preview { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* --- CHAT UI --- */
    #chatSection { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
    #chatBox { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
    .chat-msg { margin-bottom: 10px; font-size: 13px; }
    .msg-user { color: #0ea5e9; font-weight: 600; }
    .msg-ai { color: #F9FAFB; }
    .chat-input-group { display: flex; gap: 8px; }
    #chatInput, #globalChatInput { flex: 1; background: var(--bg-card); border: 1px solid var(--border-light); color: white; border-radius: 8px; padding: 8px; outline: none; font-family: inherit; font-size: 13px; }
    #sendBtn { background: var(--accent-gradient); border: none; color: white; border-radius: 8px; padding: 0 15px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px; }
    #globalSendBtn { background: var(--success-base); border: none; color: white; border-radius: 8px; padding: 0 15px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px; }

    #downloadBtn { background: rgba(16, 185, 129, 0.1); color: #6ee7b7; border: 1px solid var(--success-base); margin-top: 20px; width: 100%; display: none; cursor: pointer; padding: 12px; border-radius: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <h1>
    <div class="title-group">Briefly.</div>
    <button id="historyBtn" class="icon-btn" title="View History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
    </button>
  </h1>

  <div id="mainView">
    <div style="display: flex; justify-content: center; width: 100%;"><div id="status" class="status-pill">Ready</div></div>
    <select id="languageSelect">
      <option value="English">Output: English</option>
      <option value="Bengali">Output: Bengali</option>
      <option value="Hindi">Output: Hindi</option>
    </select>
    <button id="startBtn" class="primary">Start AI Recording</button>
    <div id="controlGroup" class="controls">
      <button id="pauseBtn" style="background: var(--border-light); color: white;">Pause</button>
      <button id="stopBtn" style="background: rgba(244, 63, 94, 0.2); color: #fda4af; border: 1px solid var(--recording-base);">Summarize</button>
    </div>
    <div id="results" style="display:none;">
      <div class="section-title">Summary</div>
      <div id="summaryText" class="text-content"></div>
      <div class="section-title">Action Items</div>
      <ul id="actionItemsList"></ul>
      
      <div id="deadlinesContainer" style="display:none; margin-top:20px;">
        <div class="section-title" style="color:#0ea5e9; display:flex; align-items:center; gap:5px;">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> Upcoming Deadlines
        </div>
        <ul id="deadlinesList"></ul>
      </div>

      <div class="section-title">Key Decisions</div>
      <ul id="decisionsList"></ul>

      <div id="accountabilityContainer" style="display:none; margin-top:20px;">
        <div class="section-title" style="color:#a78bfa; display:flex; align-items:center; gap:5px;">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Speaker Accountability
        </div>
        <div id="accountabilityList"></div>
      </div>

      <div id="diagramContainer" style="display:none; margin-top:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div class="section-title">Architecture / Flow Diagram</div>
          <div style="display:flex; gap:6px; align-items:center;">
            <button id="viewDiagramBtn" style="background:rgba(99,102,241,0.1); color:#a5b4fc; border:1px solid #6366f1; border-radius:6px; padding:4px 8px; font-size:10px; cursor:pointer; font-weight:bold; display:none; align-items:center; gap:4px;">
              <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
              View Diagram
            </button>
            <button id="copyDiagramBtn" style="background:rgba(14, 165, 233, 0.1); color:#0ea5e9; border:1px solid #0ea5e9; border-radius:6px; padding:4px 8px; font-size:10px; cursor:pointer; font-weight:bold; display:none; align-items:center; gap:4px;">
              <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              Copy Code
            </button>
          </div>
        </div>
        <div id="noDiagramMsg" style="color:var(--text-muted); font-size:13px; font-style:italic; padding:10px; display:none; text-align:center;">Flowchart is not required for this audio.</div>

      </div>
      
      <div id="chatSection">
        <div class="section-title">Chat with Meeting</div>
        <div id="chatBox"></div>
        <div class="chat-input-group">
          <input type="text" id="chatInput" placeholder="Ask about this meeting...">
          <button id="sendBtn">Ask</button>
        </div>
      </div>

      <button id="downloadBtn">Download Notes (.txt)</button>
      <button id="notionBtn" style="background: rgba(14, 165, 233, 0.1); color: #0ea5e9; border: 1px solid #0ea5e9; margin-top: 10px; width: 100%; display: none; cursor: pointer; padding: 12px; border-radius: 10px; font-weight: 600; display:flex; justify-content:center; align-items:center; gap:8px;">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Copy for Notion
      </button>
    </div>
  </div>

  <div id="historyView" style="display:none;">
    <button id="backBtn" class="icon-btn" style="margin-bottom: 10px;">Back to Recording</button>
    
    <div id="globalChatSection" style="margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
      <div class="section-title" style="color: #0ea5e9; display:flex; align-items:center; gap:5px;">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        Global Chat
      </div>
      <div id="globalChatBox" style="height: 120px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); font-size: 13px;"></div>
      <div class="chat-input-group">
        <input type="text" id="globalChatInput" placeholder="Search across all meetings...">
        <button id="globalSendBtn">Ask</button>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div class="section-title">Previous Meetings</div>
      <button id="clearHistoryBtn" style="background:none; border:none; color:#ef4444; font-size:11px; cursor:pointer; font-weight:bold;">Clear All</button>
    </div>
    <div id="historyList" class="history-list"></div>
  </div>

  <div id="jiraModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:20px; width:80%; max-height:80%; overflow-y:auto; box-sizing:border-box;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0; color:#0ea5e9; font-size:16px; display:flex; align-items:center; gap:6px;">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
          Task Details
        </h3>
        <button id="closeJiraBtn" class="icon-btn" style="padding:4px;">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="jiraContent" style="background:var(--bg-base); padding:15px; border-radius:8px; font-size:12px; white-space:pre-wrap; border:1px solid var(--border-light); font-family:monospace;"></div>
      <button id="copyJiraBtn" class="primary" style="margin-top:15px; background:var(--success-base);">Copy Task</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
